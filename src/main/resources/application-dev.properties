# =====================================================
# Configuração de Desenvolvimento - H2 Database
# =====================================================

# --------------------- DB Connection ------------------
spring.datasource.url=jdbc:h2:mem:gat3db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# --------------------- H2 Console ---------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --------------------- JPA/Hibernate ------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# --------------------- Flyway -------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --------------------- API Externa --------------------
aghu.api.base-url=http://localhost:8080/api
aghu.api.token=dev-token-placeholder


