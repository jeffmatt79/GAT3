services:
  deploy_postgres_prod:
    image: postgres:15
    container_name: ${API_PG_ADDR} 
    restart: always
    networks:
      - nginx
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_PROD}
      POSTGRES_USER: ${POSTGRES_USER_PROD}
    ports:
      - "5432:5432"
    volumes:
      - /docker/postgres:/var/lib/postgresql/data

  # deploy_backend: 
  #   image: $DOCKER_USER/$DOCKER_IMAGE_NAME:$CI_COMMIT_SHA
  #   container_name: api_container
  #   restart: always
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - nginx
  #   environment:
  #     API_PG_ADDR: ${API_PG_ADDR} 
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_HMG}
  #     POSTGRES_USER: ${POSTGRES_USER_HMG}
  #     SPRING_PROFILES_ACTIVE: hmg
  #   volumes:
  #     - /docker/gat3-api:/opt/api
  #   depends_on:
  #     - deploy_postgres_hmg
  deploy_keycloak: 
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: keycloak
    restart: unless-stopped
    networks:
      - nginx
    environment:
      - KEYCLOAK_ADMIN=${KC_ADMIN_USER}
      - KEYCLOAK_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD}
      - KC_DB=${KC_DB}
      - KC_DB_URL_HOST=${KC_DB_URL_HOST}
      - KC_DB_URL_DATABASE=${KC_DB_URL_DATABASE}
      - KC_DB_USERNAME=${KC_DB_USERNAME}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
    ports:
      - "8080:8080"
    labels: 
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`gat3.huwc.ufc.br`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    volumes:
      - /docker/keycloak:/opt/keycloak/data
    command: 
      - start
      - "--hostname=gat3.huwc.ufc.br" 
      - "--proxy=edge"
      - "--http-relative-path=/auth"
    depends_on:
      - deploy_postgres_prod

  deploy_traefik: 
    image: traefik:v2.11
    container_name: traefik
    restart: always
    networks:
      - nginx
    ports:
      - "80:80"
      - "443:443"
      - "8090:8080"
    command:
      - "--log.level=DEBUG" 

      # API e Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=true" 
      
      # Provedores (Providers)
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=nginx"                # Garantir que ele olhe para sua rede

      # EntryPoints
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--entryPoints.traefik.address=:8080"             # Para o dashboard na 8090:8080
      
      # Configuração para o Traefik confiar nos cabeçalhos encaminhados (necessário atrás de proxy)
      - "--entryPoints.web.forwardedHeaders.insecure=true"
      - "--entryPoints.websecure.forwardedHeaders.insecure=true"

      # Logs
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--log.level=DEBUG"

      # Provedor de arquivos, apontando apenas para o arquivo de certificado (configuração dinâmica)
      - "--providers.file.filename=/certs/tls.yml" # <- Assumindo que você renomeou
      - "--providers.file.watch=true"

      # Opcional: Redirecionamento HTTP -> HTTPS (Middleware)
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    volumes:
      - /docker/traefik/logs:/var/log/traefik             # Mapeia um diretório local 'logs' para o contêiner
      - "/docker/traefik:/opt/traefik:ro"                 # monta todo o diretório de config
      - "/docker/traefik/certs:/certs:ro"                 # certificados
      - "/var/run/docker.sock:/var/run/docker.sock:ro"    # provider Docker
    depends_on:
      - deploy_keycloak


networks:
  nginx:
    external: true
 